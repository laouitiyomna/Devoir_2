<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>Liste des Événements</title>
    <link rel="stylesheet" href="webjars/bootstrap/4.3.1/css/bootstrap.min.css"/>
</head>
<body>

<div th:replace="~{template}"></div>

<div class="container mt-4">
    <div class="card">
        <div class="card-header">Liste des Événements</div>
        <div class="card-body">

            <!-- Barre de recherche -->
            <form method="get" th:action="@{ListeEvenements}" class="mb-3">
                <div class="input-group w-50">
                    <input type="text" class="form-control" name="kw"
                           th:value="${kw}" placeholder="Rechercher par nom..."/>
                    <input type="hidden" name="size" th:value="${size}"/>
                    <div class="input-group-append">
                        <button type="submit" class="btn btn-primary">Rechercher</button>
                        <a th:href="@{ListeEvenements}" class="btn btn-secondary">Réinitialiser</a>
                    </div>
                </div>
            </form>

            <table class="table table-striped table-bordered">
                <thead class="thead-dark">
                <tr>
                    <th>ID</th>
                    <th>Nom Événement</th>
                    <th>Lieu</th>
                    <th>Date</th>
                    <th>Organisateur</th>
                    <th>Genre</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="e : ${evenements.content}">
                    <td th:text="${e.idEvenement}"></td>
                    <td th:text="${e.nomEvenement}"></td>
                    <td th:text="${e.lieu}"></td>
                    <td th:text="${#dates.format(e.dateEvenement, 'dd/MM/yyyy')}"></td>
                    <td th:text="${e.organisateur}"></td>
                    <td th:text="${e.genre != null ? e.genre.nomGenre : '-'}"></td>
                    <td>
                        <a class="btn btn-warning btn-sm"
                           th:href="@{modifierEvenement(id=${e.idEvenement})}">
                            Modifier
                        </a>
                        <a class="btn btn-danger btn-sm"
                           onclick="return confirm('Êtes-vous sûr ?')"
                           th:href="@{supprimerEvenement(id=${e.idEvenement},
                           page=${currentPage}, size=${size})}">
                            Supprimer
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>

            <!-- Pagination -->
            <ul class="nav nav-pills mt-2">
                <li class="nav-item" th:each="page, status : ${pages}">
                    <a th:class="${status.index == currentPage ? 'btn btn-primary mr-1' : 'btn btn-default mr-1'}"
                       th:href="@{ListeEvenements(page=${status.index}, size=${size}, kw=${kw})}"
                       th:text="${status.index + 1}"></a>
                </li>
            </ul>

        </div>
    </div>
</div>

<script src="webjars/jquery/3.5.1/jquery.min.js"></script>
<script src="webjars/bootstrap/4.3.1/js/bootstrap.min.js"></script>
</body>
</html>
