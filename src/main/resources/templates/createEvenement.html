<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>Ajouter un Événement</title>
    <link rel="stylesheet" href="webjars/bootstrap/4.3.1/css/bootstrap.min.css"/>
</head>
<body>

<div th:replace="~{template}"></div>

<div class="container mt-4">
    <div class="card">
        <div class="card-header">Ajouter un Événement</div>
        <div class="card-body">

            <div th:if="${msg}" class="alert alert-success" th:text="${msg}"></div>

            <form method="post" th:action="@{saveEvenement}">

                <div class="form-group">
                    <label>Nom Événement</label>
                    <input type="text" class="form-control" name="nomEvenement" required/>
                </div>

                <div class="form-group">
                    <label>Lieu</label>
                    <input type="text" class="form-control" name="lieu" required/>
                </div>

                <div class="form-group">
                    <label>Date</label>
                    <input type="date" class="form-control" name="date" required/>
                </div>

                <div class="form-group">
                    <label>Organisateur</label>
                    <input type="text" class="form-control" name="organisateur" required/>
                </div>

                <div class="form-group">
                    <label>Genre</label>
                    <select class="form-control" name="idGenre">
                        <option value="">-- Sélectionner un genre --</option>
                        <option th:each="g : ${genres}"
                                th:value="${g.idGenre}"
                                th:text="${g.nomGenre}">
                        </option>
                    </select>
                </div>

                <button type="submit" class="btn btn-primary">Enregistrer</button>
                <a th:href="@{ListeEvenements}" class="btn btn-secondary ml-2">Annuler</a>
            </form>

        </div>
    </div>
</div>

<script src="webjars/jquery/3.5.1/jquery.min.js"></script>
<script src="webjars/bootstrap/4.3.1/js/bootstrap.min.js"></script>
</body>
</html>
